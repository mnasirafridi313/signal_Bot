<script>
let PUBLIC_KEY = "A5MS68aoOqXE3gRAdrW4GLJ8L";
let apiKey = "";
let timerInt;

// ===== INIT =====
window.onload = function(){
  const saved = localStorage.getItem("apiKey");

  if(saved){
    apiKey = saved;
    log("Using USER API");
  }else{
    apiKey = PUBLIC_KEY;
    log("Using PUBLIC API");
  }
};

// ===== SAVE USER KEY =====
function saveKey(){
  const key = document.getElementById("api").value.trim();

  if(key.length < 10){
    log("Invalid API key");
    return;
  }

  localStorage.setItem("apiKey", key);
  apiKey = key;
  log("User API saved");
}

// ===== DEBUG LOGGER =====
function log(msg){
  document.getElementById("debug").innerText += msg + "\n";
}

// ===== ERROR CATCH =====
window.onerror = function(msg, url, line){
  log("ERROR: " + msg + " line: " + line);
};

// ===== FETCH PRICE =====
async function fetchPrice(symbol){
  const url=`https://api-v4.fcsapi.com/forex/latest?symbol=${symbol}&access_key=${apiKey}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.response){
    throw "API LIMIT / ERROR";
  }

  return parseFloat(data.response[0].c);
}

// ===== FETCH HISTORY =====
async function fetchHistory(symbol, tf){
  const url=`https://api-v4.fcsapi.com/forex/history?symbol=${symbol}&period=${tf}&access_key=${apiKey}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.response){
    throw "History API error";
  }

  return data.response.map(c=>parseFloat(c.c));
}

// ===== SMA =====
function sma(arr,n){
  const slice = arr.slice(-n);
  return slice.reduce((a,b)=>a+b,0)/n;
}<script>
// ===== SIGNAL LOGIC =====
function getSignalLogic(price, closes){
  if(closes.length < 50){
    return {text:"WAIT", cls:"neutral"};
  }

  const s = sma(closes,50);

  if(price > s){
    return {text:"BUY", cls:"buy"};
  }else if(price < s){
    return {text:"SELL", cls:"sell"};
  }else{
    return {text:"WAIT", cls:"neutral"};
  }
}

// ===== TIMER =====
function startTimer(sec){
  clearInterval(timerInt);

  timerInt = setInterval(()=>{
    sec--;
    document.getElementById("timer").innerText =
      "Time: " + sec + "s";

    if(sec <= 0) clearInterval(timerInt);
  },1000);
}

// ===== MAIN FUNCTION =====
async function getSignal(){
  try{
    document.getElementById("signal").innerText = "Loading...";

    const pair = document.getElementById("pair").value;
    const tf   = document.getElementById("time").value;

    log("Fetching price...");
    const price = await fetchPrice(pair);

    log("Fetching candles...");
    const closes = await fetchHistory(pair, tf);

    document.getElementById("price").innerText =
      "Price: " + price;

    const result = getSignalLogic(price, closes);

    const sig = document.getElementById("signal");
    sig.innerText = result.text;
    sig.className = "signal " + result.cls;

    // ===== TIMER RULE =====
    let sec = 30;

    if(tf==="60") sec=30;
    if(tf==="90") sec=45;
    if(tf==="120") sec=60;
    if(tf==="300") sec=150;

    if(tf==="1m") sec=180;
    if(tf==="5m") sec=900;
    if(tf==="15m") sec=2700;
    if(tf==="30m") sec=5400;

    startTimer(sec);

    log("Done");

  }catch(e){
    document.getElementById("signal").innerText="ERROR";
    log(e);
  }
}
</script><div id="debug"></div>
