<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signal Bot</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:#fff;
      text-align:center;
    }

    .box{
      max-width:500px;
      margin:auto;
      padding:20px;
    }

    select,button,input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:none;
      font-size:16px;
    }

    button{
      background:#2563eb;
      color:#fff;
      font-weight:bold;
    }

    .signal{
      font-size:30px;
      margin-top:20px;
    }

    .buy{color:#22c55e}
    .sell{color:#ef4444}
    .neutral{color:#9ca3af}

    .strong{color:#3b82f6}
    .strongest{color:#c084fc}

    .price{
      font-size:22px;
      margin-top:10px;
    }
  </style>
</head>

<body>
<div class="box">

<h2>Signal Bot</h2>

<input id="api" placeholder="Enter FCS API Key"/>

<select id="mode">
  <option value="binary">Binary</option>
  <option value="spot">Spot</option>
</select>

<select id="pair"></select>
<select id="time"></select>

<button onclick="getSignal()">Refresh</button>

<div class="price" id="price">--</div>
<div class="signal neutral" id="signal">WAIT</div>
<div id="timer"></div>

</div>

<script>
let apiKey="";
let timerInt;

const pairs={
  binary:["EURUSD","USDJPY","GBPUSD"],
  spot:["XAUUSD","BTCUSDT","ETHUSDT"]
};

const times={
  binary:["60","90","120","300"],
  spot:["1m","5m","15m","30m"]
};

function init(){
  updateUI();
}

function updateUI(){
  const mode=document.getElementById("mode").value;

  const pairSel=document.getElementById("pair");
  pairSel.innerHTML="";
  pairs[mode].forEach(p=>{
    pairSel.innerHTML+=`<option>${p}</option>`;
  });

  const timeSel=document.getElementById("time");
  timeSel.innerHTML="";
  times[mode].forEach(t=>{
    timeSel.innerHTML+=`<option>${t}</option>`;
  });
}

document.getElementById("mode").onchange=updateUI;

async function fetchPrice(symbol){
  const url=`https://api-v4.fcsapi.com/forex/latest?symbol=${symbol}&access_key=${apiKey}`;
  const res=await fetch(url);
  const data=await res.json();

  return parseFloat(data.response[0].c);
}

async function fetchHistory(symbol,tf){
  const url=`https://api-v4.fcsapi.com/forex/history?symbol=${symbol}&period=${tf}&access_key=${apiKey}`;
  const res=await fetch(url);
  const data=await res.json();

  return data.response.map(c=>parseFloat(c.c));
}

function sma(arr,n){
  const slice=arr.slice(-n);
  return slice.reduce((a,b)=>a+b,0)/n;
}function getSignalLogic(price,closes){
  if(closes.length<50) return {text:"WAIT",cls:"neutral"};

  const s=sma(closes,50);

  if(price>s){
    return {text:"BUY",cls:"buy"};
  }else if(price<s){
    return {text:"SELL",cls:"sell"};
  }else{
    return {text:"WAIT",cls:"neutral"};
  }
}

function startTimer(sec){
  clearInterval(timerInt);

  timerInt=setInterval(()=>{
    sec--;
    document.getElementById("timer").innerText="Time: "+sec+"s";
    if(sec<=0) clearInterval(timerInt);
  },1000);
}

async function getSignal(){
  try{
    apiKey=document.getElementById("api").value;
    const pair=document.getElementById("pair").value;
    const tf=document.getElementById("time").value;

    document.getElementById("signal").innerText="Loading...";

    const price=await fetchPrice(pair);
    const closes=await fetchHistory(pair,tf);

    document.getElementById("price").innerText="Price: "+price;

    const result=getSignalLogic(price,closes);

    const sig=document.getElementById("signal");
    sig.innerText=result.text;
    sig.className="signal "+result.cls;

    let sec=30;
    if(tf==="60") sec=30;
    if(tf==="90") sec=45;
    if(tf==="120") sec=60;
    if(tf==="300") sec=150;

    if(tf==="1m") sec=180;
    if(tf==="5m") sec=900;
    if(tf==="15m") sec=2700;
    if(tf==="30m") sec=5400;

    startTimer(sec);

  }catch(e){
    document.getElementById("signal").innerText="ERROR";
    console.log(e);
  }
}

init();
</script>
</body>
</html>
